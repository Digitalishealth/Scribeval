name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/

      - name: Run tests
        run: pytest -q

      - name: Validate all rubrics
        run: |
          for f in rubrics/*.yaml; do
            python -c "from scribeval.rubrics.loader import load_rubric; load_rubric('$f'); print('ok: $f')"
          done

      - name: Public release audit
        run: python scripts/public_release_audit.py

      - name: Validation pack audit
        run: python scripts/validation_pack_audit.py

      - name: Validation evidence run audit
        run: python scripts/audit_validation_evidence_runs.py
