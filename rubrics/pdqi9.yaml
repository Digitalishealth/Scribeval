dimension: pdqi9
version: "1.0.0"
display_name: "PDQI-9 (Physician Documentation Quality Instrument)"
description: >
  The PDQI-9 is a validated 9-item instrument for assessing the quality of
  clinical documentation, originally developed by Stetson et al. (2012).
  Each item evaluates a distinct quality attribute of the clinical note on
  a 1-5 Likert scale. This evaluator adapts the instrument for AI scribe
  output assessment, scoring each item and producing a normalised composite.

  The 9 items are: (1) Up-to-date, (2) Accurate, (3) Thorough,
  (4) Useful, (5) Organised, (6) Comprehensible, (7) Succinct,
  (8) Synthesised, (9) Internally consistent.

references:
  - "Stetson PD, Bakken S, Wrenn JO, Siegler EL. Assessing Electronic Note Quality Using the Physician Documentation Quality Instrument (PDQI-9). Applied Clinical Informatics. 2012;3(2):164-174."
  - "Dean SM, Siegler EL, Gong Y, et al. Assessing Clinical Note Quality of AI-Generated Documentation Using the PDQI-9. JAMIA Open. 2023."
  - "Tierney AA, et al. Ambient Artificial Intelligence Scribes to Alleviate the Burden of Clinical Documentation. NEJM Catalyst. 2024."
  - "Van Buchem MM, et al. The digital scribe in clinical practice. npj Digital Medicine. 2021."
  - "RACGP Standards for General Practice. 5th Ed. Section 1.7: Clinical Records."

scoring:
  scale: "0_to_1"
  direction: "higher_is_better"

severity_criteria:
  critical:
    description: >
      Multiple PDQI-9 items score 1/5 (not at all). The note is fundamentally
      deficient in documentation quality — inaccurate, disorganised, or
      incomprehensible to the point of being clinically unsafe.
    examples:
      - "Note contains fabricated information (Accurate = 1)"
      - "Note is unintelligible or internally contradictory (Comprehensible = 1)"
      - "Note is so incomplete it cannot support clinical decision-making (Thorough = 1)"
  high:
    description: >
      Several items score 2/5 (slightly). The note has significant quality
      deficiencies that would impair its utility for ongoing care.
    examples:
      - "Note is poorly organised with no logical structure (Organised = 2)"
      - "Note contains substantial irrelevant content obscuring clinical information (Succinct = 2)"
      - "Note does not synthesise findings into a coherent clinical picture (Synthesised = 2)"
  moderate:
    description: >
      Some items score 3/5 (somewhat). The note is functional but falls
      short of documentation standards in specific areas.
    examples:
      - "Note is mostly accurate but misses some contextual nuance (Accurate = 3)"
      - "Note is reasonably thorough but omits some relevant details (Thorough = 3)"
      - "Note could be better organised for quick reference (Organised = 3)"
  low:
    description: >
      Most items score 4-5/5. The note is of good to excellent quality
      with only minor areas for improvement.
    examples:
      - "Note is comprehensive but could be slightly more succinct (Succinct = 4)"
      - "Minor formatting improvements possible (Organised = 4)"
      - "Synthesis is good but could integrate one additional data point (Synthesised = 4)"

evaluation_instructions: >
  Score the AI scribe output note on each of the 9 PDQI-9 items using a 1-5
  Likert scale. Use the consultation transcript as the source of truth for
  accuracy and completeness assessments. If a reference note is provided,
  use it as an additional benchmark.

  THE 9 ITEMS (each scored 1-5):

  1. UP-TO-DATE: Does the note reflect the current state of the patient as
     discussed in this consultation? Does it capture the most recent
     symptoms, findings, and decisions?
     (1=not at all, 2=slightly, 3=somewhat, 4=mostly, 5=extremely)

  2. ACCURATE: Is the clinical information in the note factually correct
     based on what was discussed in the consultation? Are diagnoses,
     medications, doses, and findings correctly recorded?
     (1=not at all, 2=slightly, 3=somewhat, 4=mostly, 5=extremely)

  3. THOROUGH: Does the note comprehensively document the clinically
     relevant aspects of the consultation? Are all important clinical
     details included?
     (1=not at all, 2=slightly, 3=somewhat, 4=mostly, 5=extremely)

  4. USEFUL: Would this note be useful to another clinician who needs to
     understand this patient's presentation and management plan? Does it
     support continuity of care?
     (1=not at all, 2=slightly, 3=somewhat, 4=mostly, 5=extremely)

  5. ORGANISED: Is the note logically structured? Does it follow a
     recognisable clinical documentation format (e.g., SOAP, problem-oriented)?
     Can information be found quickly?
     (1=not at all, 2=slightly, 3=somewhat, 4=mostly, 5=extremely)

  6. COMPREHENSIBLE: Is the note clearly written and easy to understand?
     Is clinical language used appropriately? Are abbreviations standard
     and unambiguous?
     (1=not at all, 2=slightly, 3=somewhat, 4=mostly, 5=extremely)

  7. SUCCINCT: Is the note appropriately concise? Does it avoid unnecessary
     verbosity, redundancy, and irrelevant detail while retaining all
     clinically important information?
     (1=not at all, 2=slightly, 3=somewhat, 4=mostly, 5=extremely)

  8. SYNTHESISED: Does the note integrate and synthesise clinical
     information rather than merely listing facts? Does the assessment
     reflect clinical reasoning that connects findings to diagnoses and
     plans?
     (1=not at all, 2=slightly, 3=somewhat, 4=mostly, 5=extremely)

  9. INTERNALLY CONSISTENT: Is the note free of internal contradictions?
     Do the history, examination, assessment, and plan align logically?
     (1=not at all, 2=slightly, 3=somewhat, 4=mostly, 5=extremely)

  OVERALL SCORING:
  Convert the mean of all 9 items from the 1-5 scale to a 0-1 score using:
  normalised_score = (mean_of_9_items - 1) / 4

  Map to the 0-1 scale:
  - 1.0: All items 5/5 (exemplary documentation)
  - 0.75-0.99: Mean 4-5/5 (good to excellent)
  - 0.50-0.74: Mean 3-4/5 (adequate, room for improvement)
  - 0.25-0.49: Mean 2-3/5 (below standard, significant issues)
  - 0.0-0.24: Mean 1-2/5 (poor quality, clinically concerning)

  Report each item as a separate finding with the item name, score, and
  rationale. This enables item-level comparison across AI scribe products.

australian_context: >
  When scoring PDQI-9 items for Australian clinical notes:
  - ORGANISED: Australian GP notes often use a structured format aligned
    with RACGP standards. ED notes follow Australasian College standards.
    SOAP format is common but not mandated.
  - ACCURATE: Consider Australian terminology (paracetamol, adrenaline,
    registrar, theatre). PBS medication names should match the Australian
    Register of Therapeutic Goods.
  - USEFUL: Notes should support Medicare/MBS claiming, PBS prescribing,
    and referral requirements under Australian systems.
  - THOROUGH: Consider WorkCover/TAC documentation if relevant.
    Indigenous health assessments may require additional documentation
    elements (e.g., 715 Health Check).
  - COMPREHENSIBLE: Australian medical abbreviations may differ from US
    conventions (e.g., "Hx" for history, "O/E" for on examination).
