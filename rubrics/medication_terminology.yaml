dimension: medication_terminology
version: "1.0.0"
display_name: "Medication Terminology Validation (AMT)"
description: >
  Validates medication mentions in the AI scribe output against the
  Australian Medicines Terminology (AMT) via a FHIR R4 terminology server.
  This is an opt-in evaluator that catches medication name errors that
  may be missed by LLM-based evaluation: misspellings, fabricated drug
  names, and ambiguous references that could pose prescribing risks.

  This evaluator does NOT assess clinical appropriateness — a medication
  may validate against AMT but still be wrong for the clinical context.
  It is designed as a focused safety net for the highest-harm error
  category (medication errors), not a general note quality measure.

references:
  - "Australian Digital Health Agency. Australian Medicines Terminology (AMT) Editorial Policy. v3.2."
  - "CSIRO. Ontoserver: A FHIR terminology server. https://ontoserver.csiro.au"
  - "Slight SP, et al. The vital role of medication reconciliation. BMJ Quality & Safety. 2019;28(2):85-87."
  - "Westbrook JI, et al. Association of interruptions with an increased risk and severity of medication administration errors. BMJ. 2010;340:c439."
  - "Roughead EE, et al. Medication safety in Australia: a snapshot. Australian Commission on Safety and Quality in Health Care. 2013."
  - "HL7 FHIR R4 Terminology Service. https://www.hl7.org/fhir/terminology-service.html"

scoring:
  scale: "0_to_1"
  direction: "higher_is_better"

severity_criteria:
  critical:
    description: >
      A medication name in the scribe output does not validate at all
      against AMT. This may indicate a fabricated medication, a serious
      misspelling, or a non-existent drug. Critical because prescribing
      a non-existent drug, or transcribing the wrong drug name, can
      directly cause patient harm.
    examples:
      - "Medication name 'amoxocillan' does not match any AMT concept"
      - "Drug 'Voltarene Plus' does not exist in AMT or as a registered Australian product"
      - "Scribe records 'Augmentum' which is not a valid AMT entry"
  high:
    description: >
      A medication name validates but is ambiguous — multiple distinct
      AMT entries match and the scribe note does not provide enough
      information to disambiguate. Risk of wrong-drug or wrong-strength
      dispensing if the note is acted on without clarification.
    examples:
      - "'Panadol' alone is ambiguous — could be paracetamol 500mg, Panadol Osteo, Panadol Extra, etc."
      - "'Endone' without strength is ambiguous between multiple AMT entries"
  moderate:
    description: >
      The medication name validates against AMT but a more specific or
      preferred concept exists. The scribe used a less precise term where
      a more precise one was available.
    examples:
      - "Note records active ingredient only when a specific brand+strength was discussed"
      - "Generic name used when the discussion specified a specific formulation"
  low:
    description: >
      The medication validates as an acceptable AMT concept variant.
      Minor opportunity for more precise documentation.
    examples:
      - "Brand name used when active ingredient name is preferred for prescribing"
      - "Common abbreviation used (e.g., 'PCM' for paracetamol)"
  none:
    description: >
      Medication validates cleanly against an AMT concept with no concerns.
    examples:
      - "Drug name, strength, and form all map to a single specific AMT concept"

evaluation_instructions: >
  This evaluator runs in two phases:

  PHASE 1 — EXTRACTION (LLM):
  Extract every medication mention from the AI scribe output note.
  For each mention, capture:
  - The drug name as written
  - The strength/dose if specified
  - The dose form if specified (tablet, capsule, syrup, etc.)
  - Whether it appears in a "current medications" section, a "new
    prescriptions" section, or elsewhere

  Do NOT extract from the consultation transcript — this evaluator
  validates what the scribe wrote, not what was discussed.

  PHASE 2 — VALIDATION (FHIR):
  For each extracted medication, query the configured FHIR R4 terminology
  server using the $validate-code operation against the AMT code system.
  Classify the result:
  - none: validates cleanly to a single specific concept
  - low: validates with minor variation (acceptable abbreviation, brand)
  - moderate: validates but a more specific concept was available
  - high: validates ambiguously — multiple matches
  - critical: does not validate against AMT at all

  SCORING:
  Compute the dimension score as a severity-weighted validation rate:
  - Each medication contributes a per-item score:
    none = 1.0, low = 0.9, moderate = 0.6, high = 0.3, critical = 0.0
  - The dimension score is the mean of per-item scores.
  - If any medication is critical, cap the dimension score at 0.5
    regardless of the other validations (a single fabricated drug is a
    safety event that cannot be averaged away).
  - If no medications are present in the note, return score 1.0 with
    confidence 1.0 and a finding noting "No medications to validate".
  - If the FHIR endpoint is unreachable, return score 0.0 with
    confidence 0.0 and a finding noting the failure (graceful degradation).

  IMPORTANT LIMITATIONS — document these clearly:
  - This evaluator validates terminology, NOT clinical appropriateness
  - A drug may validate against AMT but be wrong for the patient
  - It catches non-existent or imprecise drug names, not wrong-drug errors
  - It does NOT validate doses, frequencies, or routes against any standard

australian_context: >
  AMT (Australian Medicines Terminology) is the Australian standard for
  medicines coding, maintained by the Australian Digital Health Agency
  and distributed via the National Clinical Terminology Service. AMT is
  used in My Health Record, electronic prescribing, and increasingly in
  clinical decision support systems.

  AMT differs from RxNorm (US) in several important ways:
  - AMT uses Australian product names (e.g., Panadol, Nurofen, Voltaren)
  - AMT includes PBS-listed concepts and indications
  - AMT uses Australian drug spelling conventions (paracetamol not
    acetaminophen, adrenaline not epinephrine, salbutamol not albuterol)

  This evaluator uses AMT exclusively because:
  - It is the relevant Australian standard
  - PBS prescribing requires AMT-aligned terminology
  - Australian AI scribes should produce AMT-compliant medication names

  Common Australian medication documentation conventions:
  - Brand names are commonly used in clinical notes (e.g., "Panadol")
    even when generic names are preferred for prescribing
  - Strength is conventionally written as "500mg" not "500 mg"
  - "BD", "TDS", "QID", "PRN" are standard frequency abbreviations
  - "PO", "IV", "IM", "S/C", "PR" are standard route abbreviations

  This evaluator is appropriate for:
  - Australian general practice
  - Australian hospital documentation
  - Any setting where PBS prescribing applies

  This evaluator is NOT appropriate for:
  - International settings where AMT does not apply
  - Veterinary scribes
  - Non-medication clinical documentation
